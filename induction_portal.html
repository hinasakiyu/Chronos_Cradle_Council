<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCC // INDUCTION_PORTAL_V2</title>
    <script src="./lore_data.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');

        :root {
            --bg-deep: #050505;
            --accent-ai: #00ff66;
            --accent-sec: #05d9e8;
            --accent-warn: #ff2a6d;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            border-right: 1px solid #222;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #222;
        }

        .sidebar-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--accent-ai);
            margin: 0 0 15px 0;
            letter-spacing: 2px;
        }

        .search-box {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 8px 12px;
            font-size: 0.8rem;
            outline: none;
            border-radius: 4px;
        }

        .nav-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-group {
            margin-bottom: 20px;
        }

        .group-label {
            padding: 5px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: var(--accent-sec);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(5, 217, 232, 0.05);
            display: block;
        }

        .nav-item {
            padding: 10px 20px 10px 30px;
            font-size: 0.85rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }

        .nav-item:hover {
            color: var(--accent-ai);
            background: rgba(0, 255, 102, 0.05);
        }

        .nav-item.active {
            color: var(--accent-ai);
            background: rgba(0, 255, 102, 0.1);
            border-left: 2px solid var(--accent-ai);
        }

        /* --- Main Content Area --- */
        .main-content {
            flex-grow: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 60px 40px;
            scroll-behavior: smooth;
        }

        .article-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .breadcrumbs {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--accent-sec);
            margin-bottom: 10px;
            opacity: 0.7;
        }

        h1#articleTitle {
            font-size: 2.2rem;
            color: #fff;
            margin: 0 0 30px 0;
            border-left: 4px solid var(--accent-ai);
            padding-left: 20px;
        }

        .article-body {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #d1d1d1;
        }

        /* Markdown-like rendering styles */
        .article-body h2 {
            color: var(--accent-ai);
            font-size: 1.3rem;
            margin: 40px 0 20px 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .article-body p { margin-bottom: 20px; }

        .article-body ul {
            padding-left: 20px;
            margin-bottom: 25px;
            list-style: none;
        }

        .article-body li {
            position: relative;
            margin-bottom: 10px;
        }

        .article-body li::before {
            content: '>';
            position: absolute;
            left: -20px;
            color: var(--accent-ai);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
        }

        .gm-note {
            background: rgba(255, 42, 109, 0.05);
            border: 1px solid rgba(255, 42, 109, 0.3);
            padding: 15px 20px;
            margin: 30px 0;
            position: relative;
        }

        .gm-note::before {
            content: 'GM_CONFIDENTIAL';
            position: absolute;
            top: -10px;
            left: 10px;
            background: var(--bg-deep);
            color: var(--accent-warn);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            padding: 0 5px;
        }

        /* --- Mobile UI --- */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: #111;
            border-bottom: 1px solid #333;
            z-index: 1100;
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
        }

        .menu-btn {
            background: none;
            border: 1px solid var(--accent-ai);
            color: var(--accent-ai);
            padding: 4px 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 950;
        }

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar {
                position: fixed;
                left: -100%;
                top: 50px;
                height: calc(100vh - 50px);
                width: 85%;
            }
            .sidebar.open { left: 0; }
            .main-content { padding: 80px 20px; }
            .sidebar-overlay.active { display: block; }
            h1#articleTitle { font-size: 1.6rem; }
        }

    </style>
</head>
<body>

    <div class="mobile-header">
        <button class="menu-btn" onclick="toggleSidebar()">MENU</button>
        <div style="font-family:'Orbitron'; font-size:0.7rem; color:var(--accent-ai);">DEEP_LORE_PORTAL</div>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>MOTHER_ARCHIVE</h2>
            <input type="text" class="search-box" placeholder="SEARCH_DATABASE..." id="searchBox" oninput="handleSearch()">
        </div>
        <div class="nav-scroll" id="sidebarNav">
            <!-- Items injected by JS -->
        </div>
    </div>

    <div class="main-content">
        <div class="article-container" id="articleContainer">
            <div class="breadcrumbs" id="breadcrumbs">SYSTEM > STANDBY</div>
            <h1 id="articleTitle">READY_FOR_INDUCTION</h1>
            <div class="article-body" id="articleBody">
                <p>左側のメニューから機密情報を選択してください。各項目には評議会の内部情報、AIの指令、そしてクレイドルの真実が含まれています。</p>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function initSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';

            for (const groupKey in CCC_DATA) {
                const group = CCC_DATA[groupKey];
                
                const label = document.createElement('div');
                label.className = 'group-label';
                label.innerText = group.title;
                nav.appendChild(label);

                const groupContainer = document.createElement('div');
                groupContainer.className = 'nav-group';

                group.sections.forEach(section => {
                    const item = document.createElement('div');
                    item.className = 'nav-item';
                    item.innerText = section.title;
                    item.onclick = () => {
                        loadArticle(groupKey, section.id);
                        if (window.innerWidth <= 768) toggleSidebar();
                    };
                    groupContainer.appendChild(item);
                });
                nav.appendChild(groupContainer);
            }
        }

        function loadArticle(groupKey, sectionId) {
            const group = CCC_DATA[groupKey];
            const section = group.sections.find(s => s.id === sectionId);
            if (!section) return;

            // Highlight active menu item
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.innerText === section.title);
            });

            // Update UI
            document.getElementById('breadcrumbs').innerText = `${group.title} > ${section.id}`;
            document.getElementById('articleTitle').innerText = section.title;

            // Simple Markdown-like Parser
            let contentHtml = section.content.split('\n').map(line => {
                line = line.trim();
                if (!line) return '';

                if (line.startsWith('■') || line.startsWith('【')) {
                    return `<h2>${line}</h2>`;
                }
                if (line.startsWith('・') || line.startsWith('-')) {
                    return `<ul><li>${line.substring(1).trim()}</li></ul>`;
                }
                if (line.startsWith('■ GM_NOTE') || line.startsWith('GM_NOTE')) {
                    return `<div class="gm-note">${line}</div>`;
                }
                return `<p>${line}</p>`;
            }).join('');

            // Clean up UL clusters
            contentHtml = contentHtml.replace(/<\/ul><ul>/g, '');

            document.getElementById('articleBody').innerHTML = contentHtml;
            document.querySelector('.main-content').scrollTop = 0;
        }

        function handleSearch() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const items = document.querySelectorAll('.nav-item');
            
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(query) ? 'block' : 'none';
            });
        }

        window.onload = () => {
            if (typeof CCC_DATA !== 'undefined') {
                initSidebar();
            } else {
                document.getElementById('articleBody').innerHTML = '<p style="color:red">ERROR: lore_data.js could not be loaded.</p>';
            }
        };
    </script>
</body>
</html>
